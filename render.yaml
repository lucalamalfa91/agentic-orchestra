services:
  - type: web
    name: agentic-orchestra-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      # ── Secrets — set manually in Render dashboard (not stored here) ──────
      - key: DATABASE_URL
        sync: false

      - key: ENCRYPTION_KEY
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: ADESSO_AI_HUB_KEY
        sync: false

      - key: ADESSO_BASE_URL
        sync: false

      - key: GITHUB_CLIENT_ID
        sync: false

      - key: GITHUB_CLIENT_SECRET
        sync: false

      - key: GITHUB_TOKEN
        sync: false

      # Optional: Vercel / Railway deploy integrations
      - key: VERCEL_CLIENT_ID
        sync: false

      - key: VERCEL_CLIENT_SECRET
        sync: false

      - key: RAILWAY_CLIENT_ID
        sync: false

      - key: RAILWAY_CLIENT_SECRET
        sync: false

      # ── Non-secret config — update URLs after first deploy ────────────────
      - key: GITHUB_REDIRECT_URI
        value: https://agentic-orchestra.vercel.app/auth/callback

      - key: GITHUB_ORG
        value: ""

      - key: REPO_NAME
        value: app-generated

      # WebSocket base URL — use wss:// because Render always terminates TLS
      - key: WS_BASE_URL
        value: wss://agentic-orchestra.onrender.com

      # CORS: only allow requests from the Vercel frontend
      - key: ALLOWED_ORIGINS
        value: https://agentic-orchestra.vercel.app

      - key: PYTHONPATH
        value: /app
