services:
  - type: web
    name: agentic-orchestra-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      # ── Secrets — set manually in Render dashboard ────────────────────────
      - key: DATABASE_URL
        sync: false

      - key: ENCRYPTION_KEY
        sync: false

      - key: JWT_SECRET
        sync: false

      # GitHub OAuth App credentials (server-level — used for all user logins)
      - key: GITHUB_CLIENT_ID
        sync: false

      - key: GITHUB_CLIENT_SECRET
        sync: false

      # ── Non-secret config — update URLs after first deploy ────────────────
      - key: GITHUB_REDIRECT_URI
        value: https://agentic-orchestra.vercel.app/auth/callback

      # WebSocket base URL — wss:// because Render terminates TLS
      - key: WS_BASE_URL
        value: wss://agentic-orchestra.onrender.com

      # CORS: restrict to Vercel frontend only
      - key: ALLOWED_ORIGINS
        value: https://agentic-orchestra.vercel.app

      - key: PYTHONPATH
        value: /app
