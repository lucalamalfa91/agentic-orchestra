[pytest]
# Pytest configuration for E2E auth flow tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require services)
    browser: Browser-based tests (require Selenium/Playwright)
    slow: Slow tests (may take longer to execute)
    skip_ci: Skip in CI environment

# Coverage options
[coverage:run]
source = ../backend
omit =
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Timeout for tests (in seconds)
timeout = 30
timeout_method = thread
