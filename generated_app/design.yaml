user_stories:
  - id: US001
    title: Visualizzare lista di todo
    description: L'utente deve poter visualizzare tutti i todo creati
    acceptance_criteria:
      - GET /todos ritorna lista completa
      - Ogni todo mostra titolo e stato completamento
      - Lista si carica al mount del componente
      - Gestione errore se API non disponibile

  - id: US002
    title: Creare nuovo todo
    description: L'utente deve poter aggiungere un nuovo todo alla lista
    acceptance_criteria:
      - Form con campo titolo obbligatorio
      - POST /todos crea record nel database
      - Todo appare immediatamente in lista
      - Validazione lato client e server
      - Reset form dopo creazione

  - id: US003
    title: Modificare todo esistente
    description: L'utente deve poter editare il titolo di un todo
    acceptance_criteria:
      - PUT /todos/{id} aggiorna record
      - Modal/inline edit per modifica titolo
      - Validazione titolo non vuoto
      - Conferma salvataggio
      - Rollback se errore API

  - id: US004
    title: Eliminare todo
    description: L'utente deve poter rimuovere un todo dalla lista
    acceptance_criteria:
      - DELETE /todos/{id} rimuove record
      - Conferma prima di eliminazione
      - Todo scompare da lista
      - Gestione errore eliminazione

  - id: US005
    title: Toggle completamento todo
    description: L'utente deve poter marcare un todo come completato
    acceptance_criteria:
      - PATCH /todos/{id}/toggle aggiorna IsCompleted
      - Checkbox per toggle stato
      - Stile differente per todo completati
      - Aggiornamento istantaneo UI

api:
  base_url: https://todo-api.azurecontainerapps.io
  endpoints:
    - path: /todos
      method: GET
      description: Recupera tutti i todo
      response_code: 200
      response_schema:
        type: array
        items:
          type: object
          properties:
            id:
              type: integer
            title:
              type: string
            isCompleted:
              type: boolean
            createdAt:
              type: string
              format: date-time

    - path: /todos
      method: POST
      description: Crea nuovo todo
      request_schema:
        type: object
        required:
          - title
        properties:
          title:
            type: string
            minLength: 1
            maxLength: 255
      response_code: 201
      response_schema:
        type: object
        properties:
          id:
            type: integer
          title:
            type: string
          isCompleted:
            type: boolean
          createdAt:
            type: string
            format: date-time

    - path: /todos/{id}
      method: GET
      description: Recupera singolo todo
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      response_code: 200

    - path: /todos/{id}
      method: PUT
      description: Aggiorna todo
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      request_schema:
        type: object
        required:
          - title
        properties:
          title:
            type: string
            minLength: 1
            maxLength: 255
      response_code: 200

    - path: /todos/{id}
      method: DELETE
      description: Elimina todo
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      response_code: 204

    - path: /todos/{id}/toggle
      method: PATCH
      description: Toggle completamento todo
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      response_code: 200

database:
  type: SQLite
  provider: EF Core
  tables:
    - name: Todo
      description: Tabella principale todo
      fields:
        - name: Id
          type: int
          constraints:
            - primary_key: true
            - auto_increment: true
        - name: Title
          type: string
          constraints:
            - nullable: false
            - max_length: 255
        - name: IsCompleted
          type: bool
          constraints:
            - nullable: false
            - default_value: false
        - name: CreatedAt
          type: datetime
          constraints:
            - nullable: false
            - default_value: CURRENT_TIMESTAMP
        - name: UpdatedAt
          type: datetime
          constraints:
            - nullable: true
      indexes:
        - name: IX_Todo_CreatedAt
          columns:
            - CreatedAt
          unique: false

frontend:
  framework: React
  styling: Tailwind CSS
  components:
    - name: TodoList
      description: Componente principale lista todo
      props:
        - name: todos
          type: array
        - name: onAdd
          type: function
        - name: onDelete
          type: function
        - name: onToggle
          type: function
        - name: onEdit
          type: function
      state:
        - name: todos
          type: array
        - name: loading
          type: boolean
        - name: error
          type: string
        - name: editingId
          type: number

    - name: TodoItem
      description: Singolo elemento todo
      props:
        - name: todo
          type: object
        - name: onDelete
          type: function
        - name: onToggle
          type: function
        - name: onEdit
          type: function

    - name: TodoForm
      description: Form creazione/modifica todo
      props:
        - name: onSubmit
          type: function
        - name: initialValue
          type: string
        - name: isLoading
          type: boolean

  hooks:
    - name: useTodos
      description: Hook per gestione todo da API
      returns:
        - todos
        - loading
        - error
        - addTodo
        - deleteTodo
        - updateTodo
        - toggleTodo

backend:
  framework: .NET 8
  api_style: Minimal API
  database_orm: Entity Framework Core
  project_structure:
    - folder: Models
      files:
        - name: Todo.cs
          description: Entita Todo
    - folder: Data
      files:
        - name: TodoDbContext.cs
          description: DbContext EF Core
    - folder: Endpoints
      files:
        - name: TodoEndpoints.cs
          description: Definizione endpoint Minimal API
    - folder: Services
      files:
        - name: TodoService.cs
          description: Logica business todo
    - folder: Migrations
      description: EF Core migrations

  dependencies:
    - name: Microsoft.EntityFrameworkCore
      version: 8.0.0
    - name: Microsoft.EntityFrameworkCore.Sqlite
      version: 8.0.0
    - name: Microsoft.AspNetCore.Cors
      version: 8.0.0

testing:
  backend:
    framework: xUnit
    coverage_target: 80
    test_categories:
      - name: Unit Tests
        path: Tests/Unit
        focus:
          - TodoService logic
          - Validation rules
          - Data mapping
      - name: Integration Tests
        path: Tests/Integration
        focus:
          - API endpoints
          - Database operations
          - Error handling

  frontend:
    framework: Jest
    coverage_target: 75
    test_categories:
      - name: Component Tests
        path: src/__tests__/components
        focus:
          - TodoList rendering
          - TodoItem interactions
          - TodoForm validation
      - name: Hook Tests
        path: src/__tests__/hooks
        focus:
          - useTodos hook
          - API calls
          - State management
      - name: Integration Tests
        path: src/__tests__/integration
        focus:
          - Full user workflows
          - API integration

azure:
  subscription: shared-subscription
  resource_group: rg-todo-app
  region: westeurope
  
  resources:
    - name: todo-api
      type: ContainerApp
      description: Backend API .NET 8
      properties:
        image_registry: crsharedacrcorchn001.azurecr.io
        image_name: todo-api
        image_tag: latest
        cpu: 0.5
        memory: 1Gi
        replicas_min: 1
        replicas_max: 3
        environment_variables:
          - name: ASPNETCORE_ENVIRONMENT
            value: Production
          - name: ConnectionStrings__DefaultConnection
            secret_ref: db-connection-string
        ingress:
          enabled: true
          external: true
          target_port: 8080
          traffic_weight: 100
        health_check:
          path: /health
          interval_seconds: 10
          timeout_seconds: 5
          failure_threshold: 3

    - name: todo-frontend
      type: StaticWebApp
      description: Frontend React + Tailwind
      properties:
        source_control: github
        repository_url: https://github.com/org/todo-app
        branch: main
        build_preset: react
        app_location: frontend
        output_location: dist
        api_location: api
        environment_variables:
          - name: VITE_API_URL
            value: https://todo-api.azurecontainerapps.io
        custom_domain: todo.example.com
        https_only: true

    - name: acr-todo-api
      type: ContainerRegistry
      description: Registro container per immagini
      properties:
        registry_name: crsharedacrcorchn001
        sku: Standard
        admin_enabled: true

    - name: keyvault-todo
      type: KeyVault
      description: Gestione secrets
      properties:
        sku: standard
        secrets:
          - name: db-connection-string
            description: SQLite connection string
          - name: api-key
            description: API authentication key

    - name: appinsights-todo
      type: ApplicationInsights
      description: Monitoring e logging
      properties:
        retention_days: 30
        sampling_enabled: true
        sampling_percentage: 100

  deployment:
    pipeline: GitHub Actions
    triggers:
      - event: push
        branch: main
        paths:
          - backend/**
          - frontend/**
          - .github/workflows/**
    
    stages:
      - name: Build Backend
        steps:
          - checkout
          - setup_dotnet: 8.0
          - restore_dependencies
          - run_tests_backend
          - build_docker_image
          - push_to_acr

      - name: Build Frontend
        steps:
          - checkout
          - setup_node: 18
          - install_dependencies
          - run_tests_frontend
          - build_production
          - deploy_static_web_app

      - name: Deploy Backend
        steps:
          - deploy_container_app
          - run_smoke_tests
          - notify_deployment

ci_cd:
  version_control: GitHub
  branch_strategy: main
  
  pre_commit_hooks:
    - name: lint-backend
      command: dotnet format --verify-no-changes
    - name: lint-frontend
      command: npm run lint
    - name: test-backend
      command: dotnet test
    - name: test-frontend
      command: npm test

  code_quality:
    sonarqube_enabled: true
    coverage_reports:
      - backend: opencover
      - frontend: lcov

monitoring:
  application_insights:
    enabled: true
    custom_metrics:
      - name: TodoCreated
        type: event
      - name: TodoDeleted
        type: event
      - name: ApiResponseTime
        type: metric
    
    alerts:
      - name: HighErrorRate
        condition: error_rate > 5%
        action: email_notification
      - name: ApiLatency
        condition: response_time > 2000ms
        action: email_notification

  logging:
    provider: Application Insights
    log_level: Information
    retention_days: 30

security:
  cors:
    enabled: true
    allowed_origins:
      - https://todo.example.com
      - http://localhost:3000
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
    allowed_headers:
      - Content-Type
      - Authorization

  authentication:
    type: none
    note: App pubblica senza autenticazione

  https:
    enforced: true
    min_tls_version: 1.2

  secrets_management:
    provider: Azure KeyVault
    rotation_enabled: true
    rotation_days: 90

documentation:
  api_docs:
    format: OpenAPI 3.0
    location: /swagger
    
  deployment_guide:
    sections:
      - Prerequisites
      - Local Development Setup
      - Database Migration
      - Azure Deployment
      - Monitoring Setup
      - Troubleshooting

  architecture_diagram:
    components:
      - React Frontend (Static Web App)
      - .NET 8 API (Container App)
      - SQLite Database
      - Azure Container Registry
      - Application Insights