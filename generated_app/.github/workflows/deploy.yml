name: Deploy Todo App

on:
  push:
    branches:
      - main

env:
  REGISTRY: crsharedacrcorchn001.azurecr.io
  BACKEND_IMAGE: todo-api
  RESOURCE_GROUP: rg-todo-app
  CONTAINER_APP_NAME: todo-api
  STATIC_WEB_APP_NAME: todo-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish -c Release -o ./publish

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR credentials
        id: acr-creds
        run: |
          ACR_USERNAME=$(az acr credential show --name crsharedacrcorchn001 --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name crsharedacrcorchn001 --query passwords[0].value -o tsv)
          echo "ACR_USERNAME=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "ACR_PASSWORD=$ACR_PASSWORD" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ steps.acr-creds.outputs.ACR_USERNAME }}
          password: ${{ steps.acr-creds.outputs.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage --watchAll=false
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          REACT_APP_API_URL: https://todo-api.azurecontainerapps.io

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: build/
          retention-days: 1

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./build

      - name: Deploy Backend to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Wait for Container App deployment
        run: |
          for i in {1..30}; do
            STATUS=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "properties.provisioningState" -o tsv)
            if [ "$STATUS" = "Succeeded" ]; then
              echo "Container App deployed successfully"
              exit 0
            fi
            echo "Waiting for deployment... (attempt $i/30)"
            sleep 10
          done
          echo "Deployment timeout"
          exit 1

      - name: Deploy Frontend to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./build
          output_location: .
          skip_app_build: true

      - name: Verify Backend Health
        run: |
          BACKEND_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          
          for i in {1..10}; do
            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" https://$BACKEND_URL/health)
            if [ "$HEALTH" = "200" ]; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Health check attempt $i/10 - Status: $HEALTH"
            sleep 5
          done
          echo "Backend health check failed"
          exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment completed successfully"
          echo "Backend: https://todo-api.azurecontainerapps.io"
          echo "Frontend: https://todo-frontend.azurestaticapps.net"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed"
          exit 1